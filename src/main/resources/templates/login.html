<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap y Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* Video fondo */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            filter: brightness(60%);
        }

        .card-login {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<!-- 🎥 VIDEO DE FONDO -->
<video autoplay muted loop class="bg-video">
    <source src="https://videos.pexels.com/video-files/32986074/14058227_2560_1440_60fps.mp4" type="video/mp4">
    Tu navegador no soporta video HTML5.
</video>

<!-- FORMULARIO -->
<div class="card shadow-lg p-4 card-login" style="width: 100%; max-width: 400px;">
    <h4 class="text-center mb-4">Inicio de sesión</h4>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
                <input type="password" name="password" id="password" class="form-control" placeholder="********" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                    <i class="bi bi-eye" id="icono-ojo"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Ingresar</button>

        <div th:if="${param.error}" class="alert alert-danger mt-3 text-center">
            Usuario o contraseña inválidos
        </div>
        <div th:if="${param.logout}" class="alert alert-success mt-3 text-center">
            Sesión cerrada correctamente
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword() {
        const input = document.getElementById("password");
        const icono = document.getElementById("icono-ojo");
        if (input.type === "password") {
            input.type = "text";
            icono.classList.remove("bi-eye");
            icono.classList.add("bi-eye-slash");
        } else {
            input.type = "password";
            icono.classList.remove("bi-eye-slash");
            icono.classList.add("bi-eye");
        }
    }
</script>
</body>
</html>
