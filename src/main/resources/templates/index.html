<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background-color: #2f3e4d;
            color: #fff;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #3c4b5c;
            color: #fff;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .card-light {
            background: #f8f9fa;
            border: none;
            border-radius: 10px;
        }

        .metric {
            font-size: 1.8rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
<!-- Sidebar -->
<div class="sidebar d-flex flex-column p-3">
    <h4 class="text-white text-center">MiApp</h4>
    <hr class="text-white">
    <a th:href="@{/inicio}" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a th:href="@{/usuarios}"><i class="bi bi-people me-2"></i> Usuarios</a>
    <a th:href="@{/pagos}"><i class="bi bi-credit-card me-2"></i> Pagos</a>
    <a th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
</div>

<!-- Contenido principal -->
<div class="main">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container-fluid">
            <h5 class="mb-0">Dashboard</h5>
            <div class="d-flex align-items-center">
                <span class="me-3 text-muted">Hola, Francisco</span>
                <img src="https://i.pravatar.cc/40?img=5" class="rounded-circle" alt="avatar">
            </div>
        </div>
    </nav>

    <!-- Métricas -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card card-light p-3 shadow-sm">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Clientes</small>
                        <div class="metric">36,254</div>
                        <small class="text-success">↑ 5.27%</small>
                    </div>
                    <i class="bi bi-people-fill fs-3 text-primary"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-light p-3 shadow-sm">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Órdenes</small>
                        <div class="metric">5,543</div>
                        <small class="text-danger">↓ 1.08%</small>
                    </div>
                    <i class="bi bi-cart-check fs-3 text-danger"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-light p-3 shadow-sm">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Ingresos</small>
                        <div class="metric">$6,254</div>
                        <small class="text-danger">↓ 7.00%</small>
                    </div>
                    <i class="bi bi-cash-stack fs-3 text-success"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-light p-3 shadow-sm">
                <div class="d-flex justify-content-between">
                    <div>
                        <small>Crecimiento</small>
                        <div class="metric">+30.56%</div>
                        <small class="text-success">↑ 4.87%</small>
                    </div>
                    <i class="bi bi-graph-up-arrow fs-3 text-info"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Gráfica -->
    <div class="card card-light shadow-sm p-4">
        <h5 class="mb-3">Proyecciones vs Realidad</h5>
        <canvas id="grafica" height="100"></canvas>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('grafica').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul'],
            datasets: [{
                label: 'Proyectado',
                data: [120, 150, 180, 200, 170, 190, 210],
                backgroundColor: 'rgba(108,117,125,0.4)'
            }, {
                label: 'Real',
                data: [100, 140, 160, 180, 155, 170, 190],
                backgroundColor: 'rgba(13,110,253,0.7)'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true } }
        }
    });
</script>
</body>
</html>
